# Configuration for MPV smartcut script
# Place this file in your MPV configuration directory under:
# %APPDATA%/mpv/script-opts/smartcut.conf (on Windows)
# or ~/.config/mpv/script-opts/smartcut.conf (on Linux/macOS)

# Path to the ffmpeg executable (assumed in PATH by default)
ffmpeg_path=ffmpeg

# Path to the smartcut executable or name of the command if it is in system PATH.
smartcut_path=smartcut

# Output directory for saved cropped clips (tilde ~ will resolve to your home user folder)
output_dir=~/Videos

# Output filename template (passed to os.date, do not use characters invalid in filenames)
filename_template=crop_%Y-%m-%d_%H-%M-%S

# Key to mark start and end timecodes (toggles on press)
mark_key=c

# Key to enter/exit crop selection mode.
# When active:
# 1. Click once to set the first corner (e.g. top-left).
# 2. Move your mouse (a red bounding box will follow your cursor).
# 3. Click a second time to set the opposite corner (e.g. bottom-right) and lock the crop area.
crop_key=r

# Key to open the format selection menu (default is n)
menu_key=n

# Key to confirm and generate the clip using the default mode (C is Shift+c)
cut_key=C

# Default output mode when cutting full-frame (no crop). Options: smartcut, smartcut_mp4, mp4, gif, avif
default_cut_mode=smartcut

# Default output mode when cropping video. Options: mp4, gif, avif (smartcut/smartcut_mp4 are not supported for cropping)
default_crop_mode=mp4


# =====================================================================
# --- Quality & Encoding Presets (Adjust to change speed/file size) ---
# =====================================================================

# --- MP4 (H.264) Settings ---
# Video encoder to use (libx264 is standard and fast, libx265 can be used for HEVC)
vcodec=libx264

# Constant Rate Factor (CRF) quality setting (lower is higher quality, 18 is visually lossless, 23 is default)
crf=18

# Encoding speed/compression preset for x264
# Values: ultrafast, superfast, veryfast, faster, fast, medium, slow, slower, veryslow
# "slow" or "slower" gives smaller file sizes for the same quality, but takes more time.
vpreset_mp4=medium

# Audio encoder (copy keeps the original audio without re-encoding)
acodec=copy


# --- AVIF (AV1) Settings ---
# Constant Rate Factor (CRF) quality setting for SVT-AV1 (lower is higher quality, 30 is default, 25 is high quality)
crf_avif=30

# Encoding speed preset for SVT-AV1 (ranges from 0 to 13, lower is slower and better compression, 6 is default)
vpreset_avif=6


# --- GIF Settings ---
# Target frame rate for animated GIFs (lower values like 15 fps keep file sizes small)
gif_fps=15

# Target width scaling for GIFs (height will scale proportionally to keep aspect ratio).
# -1 means no scaling (original crop resolution). 480 or 640 is recommended to keep GIF file size small.
gif_scale=-1
